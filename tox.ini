[tox]
envlist = lint,py3{10,11,12,13,14},py314-full
isolated_build = True
minversion = 3.3.0

[gh-actions]
# Consumed by tox-gh-actions: maps the current CI Python version to the
# matching tox env(s) so `tox` picks them up automatically.
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

[testenv]
# Pass HOME so that user & email settings in ~/.gitconfig will be honored.
passenv = HOME
extras = test
commands =
    # pytest-cov causes `datalad fusefs` processes to not terminate properly
    # during testing, so we have to use `coverage` directly
    coverage erase
    coverage run -m pytest {posargs} datalad_fuse
    coverage report

[testenv:py314-full]
# Full test suite: libfuse + network tests.  Requires libfuse on the
# system.  Downstream branches may override the `extras` line to pull in
# optional deps (e.g. remfile).
passenv = HOME
extras = test
commands =
    coverage erase
    coverage run -m pytest --libfuse --network {posargs} datalad_fuse
    coverage report

[testenv:py314-nonetwork]
# Smoke-test the --network gating: runs with `--libfuse` only, under
# bogus HTTP(S) proxies so any attempted outbound connection fails fast.
# Verifies that tests touching the public network are properly
# @pytest.mark.network-gated (and thus skipped here).  Not in envlist;
# invoked by CI explicitly.
passenv = HOME
setenv =
    http_proxy=http://localhost:19999/
    https_proxy=http://localhost:19999/
    HTTP_PROXY=http://localhost:19999/
    HTTPS_PROXY=http://localhost:19999/
    no_proxy=localhost,127.0.0.1
    NO_PROXY=localhost,127.0.0.1
extras = test
commands =
    coverage erase
    coverage run -m pytest --libfuse {posargs} datalad_fuse
    coverage report

[testenv:lint]
skip_install = True
deps =
    flake8
    flake8-bugbear
    flake8-builtins
    flake8-unused-arguments
commands =
    flake8 --config=tox.ini datalad_fuse

[testenv:benchmark]
skip_install = True
deps =
    asv[virtualenv] != 0.6.2
commands =
    asv run {posargs} HEAD^1..HEAD

[testenv:typing]
deps =
    mypy
extras = test
commands =
    mypy --follow-imports skip \
        datalad_fuse/fsspec.py \
        datalad_fuse/fuse_.py \
        datalad_fuse/utils.py

[pytest]
filterwarnings =
    # Normally, I would set the default warning handler to "error", but using
    # that in conjunction with datalad 0.15.0 and coverage leads to pytest
    # erroring out due to some unclosed file.  Restricting datalad to an
    # earlier version eliminates the error.  Not using/installing coverage
    # gives inconsistent results.
    #error
    ignore:datalad.version module will be removed:DeprecationWarning
    ignore:distutils Version classes are deprecated:DeprecationWarning
    ignore:the imp module is deprecated:DeprecationWarning
norecursedirs = datalad_fuse/tests/data
markers =
    libfuse: FUSE tests; only run when --libfuse is given
    network: tests that hit the public network; only run when --network is given

[coverage:run]
branch = True
source = datalad_fuse

[coverage:report]
precision = 2
show_missing = True
exclude_lines =
    pragma: no cover
    if TYPE_CHECKING:
    \.\.\.

[flake8]
doctests = True
exclude = .*/,build/,dist/,venv/,_datalad_buildsupport/,versioneer.py,_version.py
hang-closing = False
max-doc-length = 100
max-line-length = 80
unused-arguments-ignore-stub-functions = True
select = C,B,B902,B950,E,E242,F,I,U100,W
ignore = B005,E203,E262,E266,E501,I201,W503

[isort]
atomic = True
force_sort_within_sections = True
honor_noqa = True
lines_between_sections = 1
profile = black
reverse_relative = True
sort_relative_in_force_sorted_sections = True
known_first_party = datalad_fuse
