name: Test

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: '0 7 * * *'

jobs:
  test:
    strategy:
      fail-fast: false
      # Base matrix runs `tox` via tox-gh-actions (picks py3XX-nonetwork).
      # The nonetwork factor passes --no-network --no-forgejo and sets
      # bogus HTTP proxies to catch any test that leaks network access.
      #
      # Tox factors (combine with any pyXY):
      #   nonetwork — --no-network --no-forgejo (the CI default)
      #   full      — --libfuse (FUSE tests; network+forgejo enabled)
      #   libfuse   — --libfuse only
      matrix:
        include:
          - python-version: '3.10'
          - python-version: '3.11'
          - python-version: '3.12'
          - python-version: '3.13'
          - python-version: '3.14'
            full: true
          - python-version: '3.14'
            libfuse: true
    runs-on: ubuntu-22.04
    steps:
    - name: Set up system
      shell: bash
      run: |
        bash <(wget -q -O- https://neuro.debian.net/_files/neurodebian-ci-setup.sh)
        # enable repo for devel git-annex, if needed
        #sudo sed -e 's|\(deb.*data\)|#\1|' -e 's|/debian |/debian-devel |' /etc/apt/sources.list.d/neurodebian.sources.list | sudo tee /etc/apt/sources.list.d/neurodebian-devel.sources.list
        sudo apt-get update -qq
        sudo apt-get install eatmydata
        sudo eatmydata apt-get install git-annex-standalone
    - name: Install libfuse (full and libfuse jobs)
      if: matrix.full || matrix.libfuse
      run: sudo eatmydata apt-get install -y fuse
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install coverage datalad tox tox-gh-actions
    - name: Run tests
      run: |
        # give detailed info on actual test setup
        datalad wtf
        if [ "${{ matrix.full }}" = "true" ]; then
          tox -e py314-full
        elif [ "${{ matrix.libfuse }}" = "true" ]; then
          tox -e py314-libfuse
        else
          tox
        fi
        coverage xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
        name: py${{ matrix.python-version }}${{ matrix.full && '-full' || '' }}${{ matrix.libfuse && '-libfuse' || '' }}
